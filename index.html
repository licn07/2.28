<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>海报图库</title>
<style>
  .card-grid {
    display: flex;
    flex-wrap: wrap;
    gap: 12px;
    max-width: 1200px;
    margin: 0 auto;
    padding: 20px;
  }
  .card-item {
    width: calc(25% - 12px);
    box-sizing: border-box;
    border: 1px solid #eee;
    border-radius: 8px;
    overflow: hidden;
    text-align: center;
    background: #fff;
  }
  .card-item img {
    width: 100%;
    height: auto;
    display: block;
  }
  .card-name {
    padding: 6px 0;
    font-size: 14px;
    color: #333;
  }
  @media (max-width:768px){
    .card-item { width: calc(50% - 6px); }
  }
</style>
</head>
<body>

<div class="card-grid" id="cardContainer"></div>

<script>
const container = document.getElementById('cardContainer');
const total = 300;

async function loadCards() {
  for (let i = 1; i <= total; i++) {
    const src = `${i}.png`;
    const exists = await checkImage(src);
    if (exists) {
      const item = document.createElement('div');
      item.className = 'card-item';

      const img = document.createElement('img');
      img.src = src;
      img.loading = 'lazy';

      // 显示文件名
      const name = document.createElement('div');
      name.className = 'card-name';
      name.textContent = src;

      item.appendChild(img);
      item.appendChild(name);
      container.appendChild(item);
    }
  }
}

function checkImage(src) {
  return new Promise(resolve => {
    const img = new Image();
    img.onload = () => resolve(true);
    img.onerror = () => resolve(false);
    img.src = src;
  });
}

loadCards();
</script>

</body>
</html>
